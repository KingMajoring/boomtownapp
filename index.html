<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#151011">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Boomtown Crew 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#151011;
  --bg2:#1c1615;
  --elev:#211a18;
  --card:#241c1a;
  --card2:#2c2220;
  --border:rgba(255,255,255,.09);
  --gold:#f2a93b;
  --gold-dim:rgba(242,169,59,.28);
  --red:#ff4d5e;
  --red-dim:rgba(255,77,94,.25);
  --green:#43d17f;
  --green-dim:rgba(67,209,127,.25);
  --blue:#5aa8ff;
  --blue-dim:rgba(90,168,255,.25);
  --text:#f6efe8;
  --text-dim:#a99e97;
  --text-dim2:#7d7370;
  --font-display:'Bungee',cursive;
  --font-head:'Barlow Condensed',sans-serif;
  --font-body:'Barlow',sans-serif;
  --nav-h:64px;
  --top-h:56px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  overscroll-behavior-y:none;
  min-height:100vh;
  min-height:100dvh;
}
button,input,select{font-family:inherit;color:inherit;}
button{cursor:pointer;-webkit-user-select:none;user-select:none;}
input,select,textarea{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 12px;font-size:15px;width:100%;}
textarea{resize:vertical;font-family:inherit;}
.note-text{display:block;color:var(--text-dim);font-size:12.5px;font-style:italic;margin-top:6px;}
input::placeholder{color:var(--text-dim2);}
a{color:var(--gold);}
h1,h2,h3{margin:0;font-family:var(--font-head);font-weight:700;}
.hidden{display:none!important;}
#app{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}

/* ---------- Onboarding ---------- */
.onboard{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;gap:22px;}
.onboard-logo{font-family:var(--font-display);font-size:30px;color:var(--gold);letter-spacing:1px;line-height:1.3;}
.onboard-logo small{display:block;font-family:var(--font-head);font-size:14px;color:var(--text-dim);letter-spacing:3px;margin-top:6px;}
.onboard-card{width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px;}
.countdown-banner{display:flex;flex-direction:column;align-items:center;gap:2px;}
.countdown-num{font-family:var(--font-display);font-size:56px;line-height:1;color:var(--gold);}
.countdown-label{font-family:var(--font-head);font-size:13px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;}
.big-btn{display:flex;flex-direction:column;align-items:flex-start;gap:2px;width:100%;padding:16px 18px;border-radius:14px;border:1px solid var(--border);background:var(--card);text-align:left;min-height:60px;}
.big-btn strong{font-family:var(--font-head);font-size:17px;}
.big-btn span{color:var(--text-dim);font-size:13px;}
.big-btn.primary{background:var(--gold);border-color:var(--gold);color:#1a1210;}
.big-btn.primary span{color:#4a3416;}
.btn{padding:13px 18px;border-radius:12px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:15px;font-weight:600;min-height:46px;}
.btn.primary{background:var(--gold);border-color:var(--gold);color:#1a1210;}
.btn.primary:disabled{opacity:.4;}
.btn.danger{background:transparent;border-color:var(--red);color:var(--red);}
.btn.ghost{background:transparent;}
.btn.block{width:100%;}
.err-text{color:var(--red);font-size:13px;min-height:16px;}
.removed-notice{background:var(--card);border:1px solid var(--red);color:var(--red);border-radius:10px;padding:10px 12px;font-size:13px;text-align:left;}
.code-input{font-family:var(--font-head);letter-spacing:8px;text-align:center;font-size:26px;text-transform:uppercase;}
.link-btn{background:none;border:none;color:var(--text-dim);font-size:14px;text-decoration:underline;padding:8px;}
.install-help{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:left;display:flex;flex-direction:column;gap:8px;}
.list-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px 14px;text-align:left;}
.list-card .member-row:last-child{border-bottom:none;}
.install-step{font-size:13px;color:var(--text-dim);line-height:1.4;}
.install-step b{color:var(--text);}

/* ---------- Setup notice ---------- */
.setup-notice{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:28px;}
.setup-card{max-width:440px;background:var(--card);border:1px solid var(--gold);border-radius:16px;padding:24px;line-height:1.5;}
.setup-card h2{color:var(--gold);margin-bottom:10px;}
.setup-card code{background:var(--bg2);padding:2px 6px;border-radius:6px;font-size:13px;}

/* ---------- Top bar ---------- */
.topbar{position:fixed;top:0;left:0;right:0;z-index:20;height:calc(var(--top-h) + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);background:var(--elev);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding-left:14px;padding-right:14px;}
.brand{font-family:var(--font-display);color:var(--gold);font-size:15px;letter-spacing:.5px;white-space:nowrap;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.code-chip{font-family:var(--font-head);background:var(--card2);border:1px solid var(--border);color:var(--gold);padding:7px 12px;border-radius:20px;font-size:14px;letter-spacing:2px;font-weight:700;}
.avatar-btn{padding:0;border:none;background:none;border-radius:50%;}

/* avatars */
.avatar{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--font-head);color:#1a1210;flex-shrink:0;background-size:cover;background-position:center;border:2px solid transparent;}
.avatar.must{border-color:var(--gold);}
.avatar.maybe{border-color:var(--blue);}
.avatar.sm{width:20px;height:20px;font-size:9px;margin-left:-6px;border-width:1.5px;}
.avatar-stack{display:flex;align-items:center;padding-left:6px;}
.avatar.lg{width:88px;height:88px;font-size:28px;border-width:3px;}

/* ---------- Main / tabs ---------- */
main{flex:1;padding-top:calc(var(--top-h) + env(safe-area-inset-top));padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 10px);min-height:100vh;min-height:100dvh;}
.view{padding:12px 12px 4px;}
.section-title{font-family:var(--font-head);font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin:18px 4px 8px;}

/* day pills */
.pillrow{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px;scrollbar-width:none;}
.pillrow::-webkit-scrollbar{display:none;}
.pill{flex:0 0 auto;padding:9px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card2);font-family:var(--font-head);font-size:14px;font-weight:600;white-space:nowrap;}
.pill.active{background:var(--gold);border-color:var(--gold);color:#1a1210;}

.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.viewtoggle{display:flex;background:var(--card2);border-radius:10px;padding:3px;border:1px solid var(--border);flex-shrink:0;}
.viewtoggle button{border:none;background:none;padding:8px 12px;border-radius:8px;font-family:var(--font-head);font-size:13px;font-weight:600;color:var(--text-dim);}
.viewtoggle button.active{background:var(--gold);color:#1a1210;}
.searchbox{flex:1;position:relative;}
.searchbox input{padding-right:34px;}

/* stage card (list view) */
.stage-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.stage-head{display:flex;align-items:center;gap:10px;padding:13px 14px;width:100%;background:none;border:none;text-align:left;}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.stage-head strong{font-family:var(--font-head);font-size:15px;letter-spacing:.3px;flex:1;text-transform:uppercase;}
.stage-head .count{color:var(--text-dim);font-size:12px;font-family:var(--font-head);}
.chev{transition:transform .15s;color:var(--text-dim);}
.stage-card.open .chev{transform:rotate(180deg);}
.stage-body{display:none;border-top:1px solid var(--border);}
.stage-card.open .stage-body{display:block;}
.set-row{display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);align-items:flex-start;}
.set-row:last-child{border-bottom:none;}
.set-time{font-family:var(--font-head);color:var(--gold);font-size:13px;font-weight:600;flex:0 0 68px;line-height:1.25;}
.set-main{flex:1;min-width:0;}
.set-title{font-size:14.5px;font-weight:600;line-height:1.3;}
.set-stage-label{color:var(--text-dim);font-size:12px;margin-top:2px;}
.set-foot{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
.tagbtn{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;font-family:var(--font-head);border:1.5px solid var(--border);background:transparent;color:var(--text-dim);letter-spacing:.5px;}
.tagbtn.must-active{background:var(--gold);border-color:var(--gold);color:#1a1210;}
.tagbtn.must-inactive{border-color:var(--gold);color:var(--gold);}
.tagbtn.maybe-active{background:var(--blue);border-color:var(--blue);color:#0d1c30;}
.tagbtn.maybe-inactive{border-color:var(--blue);color:var(--blue);}
.listenbtn{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid var(--border);background:transparent;flex-shrink:0;}
.listenbtn svg{width:14px;height:14px;}
.listenbtn.spotify{border-color:#1DB954;color:#1DB954;}
.listenbtn.youtube{border-color:#FF3B30;color:#FF3B30;}
.listenbtn.lg{width:40px;height:40px;}
.listenbtn.lg svg{width:20px;height:20px;}
.listen-row{display:flex;gap:10px;margin:12px 0 4px;}

.empty-state{text-align:center;color:var(--text-dim);padding:50px 20px;font-size:14px;line-height:1.6;}

/* schedule grid */
.sched-scroll{overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:14px;background:var(--card);max-height:calc(100vh - 210px);}
.sched-hourrow{display:flex;position:sticky;top:0;z-index:5;background:var(--elev);}
.sched-corner{position:sticky;left:0;z-index:6;width:92px;flex:0 0 92px;background:var(--elev);border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.sched-hours{position:relative;height:30px;border-bottom:1px solid var(--border);}
.sched-hour-mark{position:absolute;top:0;bottom:0;padding-left:6px;display:flex;align-items:center;font-family:var(--font-head);font-size:12px;color:var(--text-dim);border-left:1px solid var(--border);}
.sched-body{position:relative;}
.sched-row{display:flex;min-height:50px;border-bottom:1px solid var(--border);}
.sched-row:last-child{border-bottom:none;}
.sched-label{position:sticky;left:0;z-index:2;width:92px;flex:0 0 92px;background:var(--bg2);display:flex;align-items:center;gap:6px;padding:0 8px;border-right:1px solid var(--border);}
.sched-label span{font-family:var(--font-head);font-size:11.5px;text-transform:uppercase;line-height:1.15;letter-spacing:.2px;}
.sched-track{position:relative;background-image:repeating-linear-gradient(to right, rgba(255,255,255,.08) 0, rgba(255,255,255,.08) 1px, transparent 1px, transparent 114px);}
.sched-block{position:absolute;border-radius:7px;padding:4px 7px 16px;border-left:3px solid;font-size:12px;line-height:1.25;font-weight:600;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.35);}
.sched-block .avset{position:absolute;bottom:3px;right:3px;display:flex;}

/* bottom sheet */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.sheet{width:100%;max-width:520px;background:var(--elev);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto;border-top:1px solid var(--border);}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:3px;margin:0 auto 16px;}
.sheet-title{font-family:var(--font-head);font-size:19px;text-transform:uppercase;margin-bottom:4px;}
.sheet-sub{color:var(--text-dim);font-size:13px;margin-bottom:16px;}
.bigtag-row{display:flex;gap:10px;margin:18px 0 6px;}
.bigtag{flex:1;padding:16px;border-radius:14px;font-family:var(--font-head);font-size:16px;font-weight:700;border:2px solid var(--border);background:var(--card2);color:var(--text-dim);text-align:center;letter-spacing:.5px;}
.bigtag.must.active{background:var(--gold);border-color:var(--gold);color:#1a1210;}
.bigtag.must:not(.active){border-color:var(--gold);color:var(--gold);}
.bigtag.maybe.active{background:var(--blue);border-color:var(--blue);color:#0d1c30;}
.bigtag.maybe:not(.active){border-color:var(--blue);color:var(--blue);}
.close-x{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-dim);font-size:22px;line-height:1;padding:4px 8px;}
.sheet-rel{position:relative;}

/* clash resolver */
.clash-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;}
.clash-row.best{border-color:var(--gold);}
.clash-toprow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.clash-badge{font-family:var(--font-head);font-size:10.5px;background:var(--gold);color:#1a1210;padding:3px 8px;border-radius:8px;font-weight:700;letter-spacing:.4px;white-space:nowrap;}
.backing-bar-track{height:6px;background:var(--bg2);border-radius:4px;margin:9px 0;overflow:hidden;}
.backing-bar-fill{height:100%;background:var(--gold);border-radius:4px;}

/* crew sheet */
.crew-code-big{font-family:var(--font-display);font-size:34px;letter-spacing:6px;color:var(--gold);text-align:center;margin:6px 0 18px;}
.member-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
.member-row:last-child{border-bottom:none;}
.member-name{font-weight:600;font-size:14.5px;}
.member-counts{color:var(--text-dim);font-size:12px;}
.member-row .live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:auto;flex-shrink:0;}

/* my plan */
.plan-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.plan-item.clash{border-color:var(--red);}
.plan-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;}
.plan-time{font-family:var(--font-head);color:var(--gold);font-size:13px;font-weight:700;}
.plan-title{font-weight:600;font-size:14.5px;margin-top:3px;}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text-dim);margin-top:6px;}
.clash-flag{color:var(--red);font-size:11.5px;font-weight:700;font-family:var(--font-head);display:flex;align-items:center;gap:4px;}
.tagpill{font-size:10.5px;font-family:var(--font-head);font-weight:700;padding:2px 8px;border-radius:8px;letter-spacing:.3px;}
.tagpill.must{background:var(--gold-dim);color:var(--gold);}
.tagpill.maybe{background:var(--blue-dim);color:var(--blue);}
.day-header{font-family:var(--font-head);font-size:14px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin:16px 4px 8px;}

/* heat */
.heat-row{display:flex;gap:12px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.heat-rank{font-family:var(--font-display);font-size:15px;color:var(--text-dim2);flex:0 0 22px;}
.heat-main{flex:1;min-width:0;}
.heat-title{font-weight:600;font-size:14px;}
.heat-meta{font-size:12px;color:var(--text-dim);margin-top:2px;}
.heat-score{font-family:var(--font-head);font-weight:700;color:var(--gold);font-size:15px;flex:0 0 auto;text-align:right;}

/* live */
.live-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
.live-status{background:var(--green-dim);border:1px solid var(--green);border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.live-status strong{color:var(--green);}
.field-label{font-family:var(--font-head);font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block;}
.field-group{margin-bottom:12px;}
.freshness{color:var(--text-dim2);font-size:11.5px;}

/* chat */
.chat-thread{max-height:65vh;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:8px;}
.chat-msg{display:flex;}
.chat-msg.me{justify-content:flex-end;}
.chat-bubble{max-width:78%;background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:8px 12px;}
.chat-msg.me .chat-bubble{background:var(--gold);border-color:var(--gold);color:#1a1210;}
.chat-sender{font-size:11px;font-weight:700;color:var(--text-dim);margin-bottom:2px;}
.chat-text{font-size:14px;line-height:1.4;white-space:pre-wrap;word-break:break-word;}
.chat-mention{color:var(--gold);font-weight:700;}
.chat-msg.me .chat-mention{color:#1a1210;text-decoration:underline;}
.chat-system{text-align:center;color:var(--text-dim);font-size:12px;padding:4px 0;}
.chat-time-inline{color:var(--text-dim2);font-size:11px;}
.chat-time{font-size:10.5px;color:var(--text-dim2);margin-top:3px;text-align:right;}
.chat-msg.me .chat-time{color:#4a3416;}
.chat-photo img{max-width:160px;border-radius:10px;margin-top:6px;display:block;}
.chat-composer{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.chat-tagbar{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;}
.chat-input-row{display:flex;gap:8px;position:relative;}
.chat-input-row input{flex:1;}
.chat-mention-suggestions{position:absolute;bottom:100%;left:0;right:0;margin-bottom:6px;background:var(--card2);border:1px solid var(--border);border-radius:10px;overflow:hidden;z-index:5;}
.chat-mention-suggestions:empty{display:none;}
.chat-mention-suggestion{display:block;width:100%;text-align:left;padding:9px 12px;background:none;border:none;color:var(--text);font-size:14px;font-weight:600;border-bottom:1px solid var(--border);}
.chat-mention-suggestion:last-child{border-bottom:none;}

/* photo sheet */
.photo-preview-wrap{display:flex;justify-content:center;margin-bottom:16px;}
.upload-label{display:block;text-align:center;padding:12px;border:1px dashed var(--border);border-radius:12px;color:var(--gold);font-size:14px;font-weight:600;margin-bottom:12px;}
.upload-label input{display:none;}

/* bottom nav */
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:20;height:calc(var(--nav-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--elev);border-top:1px solid var(--border);display:flex;}
.navbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text-dim);position:relative;}
.navbtn svg{width:22px;height:22px;}
.navbtn span{font-family:var(--font-head);font-size:11px;font-weight:600;letter-spacing:.3px;}
.navbtn.active{color:var(--gold);}
.navbadge{position:absolute;top:2px;right:calc(50% - 22px);background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-family:var(--font-head);}

@media (min-width:640px){
  .view{max-width:640px;margin:0 auto;width:100%;padding:16px;}
  .topbar-inner,.bottomnav{max-width:640px;margin:0 auto;}
}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script>
/* =====================================================================
   FIREBASE CONFIG
   Paste your project's web config below (Firebase console -> Project
   settings -> General -> Your apps -> SDK setup and configuration).
   Also create a Realtime Database (test mode, europe-west1 works well
   for a UK festival) before this will sync.

function initials(name){
  if(!name) return '?';
  const parts = name.trim().split(/\s+/).filter(Boolean);
  if(parts.length===0) return '?';

  return idx >= 0 ? idx : state.day;
}
function actStart(act){
  return new Date(new Date(FEST_DATES[act[1]]+'T00:00:00').getTime() + normMin(act[2])*60000);
}
function actEnd(act){
  return new Date(new Date(FEST_DATES[act[1]]+'T00:00:00').getTime() + normMin(act[3])*60000);
}
function formatCountdown(ms){
  if(ms <= 0) return 'now';
  const totalMin = Math.round(ms/60000);
  const d = Math.floor(totalMin/1440);
  const h = Math.floor((totalMin%1440)/60);
  const m = totalMin%60;
  if(d>0) return `${d}d ${h}h`;
  if(h>0) return `${h}h ${m}m`;
  return `${m}m`;
}
function getNowAndNextPick(){
  const now = new Date();
  let current = null, next = null;
  myPicksList().forEach(p=>{
    const act = ACTS[p.actIdx];
    const s = actStart(act), e = actEnd(act);
    if(s <= now && now < e){
      if(!current || s < actStart(ACTS[current.actIdx])) current = p;
    } else if(s > now){
      if(!next || s < actStart(ACTS[next.actIdx])) next = p;
    }
  });
  return {current, next};
}
function loadNotifiedActs(){
  try{
    const raw = localStorage.getItem('boomtown_notified_acts');
    if(raw) return new Set(JSON.parse(raw));
  }catch(e){}
  return new Set();
}
function saveNotifiedActs(){

function checkUpcomingNotifications(){
  if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
  const now = new Date();
  myPicksList().filter(p=>p.tag==='must').forEach(p=>{
    if(state.notifiedActs.has(p.actIdx)) return;
    const act = ACTS[p.actIdx];
    const diffMin = (actStart(act)-now)/60000;
    if(diffMin > 0 && diffMin <= 15){
      new Notification('Starting soon: '+act[4], {body: `${STAGES[act[0]]} · ${act[2]}`, icon: './icons/icon-192.png'});
      state.notifiedActs.add(p.actIdx);
      saveNotifiedActs();
    }
  });
}

/* ---------------------------------------------------------------------
   Firebase data access
   --------------------------------------------------------------------- */
let usersRef = null;
function attachListener(){
  if(!FB_READY || !state.code) return;
  if(usersRef) usersRef.off();
  usersRef = db.ref(`crews/${state.code}/users`);
  let sawSelf = false;
  usersRef.on('value', snap => {
    const val = snap.val() || {};
    if(val[state.userId]){
      sawSelf = true;
    } else if(sawSelf){
      // we were a confirmed member of this crew and now we're gone - the owner removed us
      handleRemovedFromCrew();
      return;
    }
    state.crewUsers = val;
    try{ localStorage.setItem('boomtown_crew_cache_'+state.code, JSON.stringify(state.crewUsers)); }catch(e){}
    render();
  });
  attachBingoListener();
  attachGroupListener();
  attachChatListener();
}
function handleRemovedFromCrew(){
  const removedCode = state.code;
  detachListeners();
  if(state.myCrews) delete state.myCrews[removedCode];
  if(state.userId){
    db.ref(`profiles/${state.userId}/crews/${removedCode}`).remove().catch(()=>{});
  }
  state.code = null;
  state.crewUsers = {};
  state.groupOwner = null;
  state.crewEntered = false;
  state.sheet = null;
  state.removedNotice = "You've been removed from that crew.";
  saveIdentity();

}
function detachListeners(){
  if(usersRef){ usersRef.off(); usersRef = null; }

function loadMyCrews(){
  if(!FB_READY || !state.userId) return;
  db.ref(`profiles/${state.userId}/crews`).once('value').then(snap => {
    state.myCrews = snap.val() || {};
    const finish = () => {
      state.myCrewsLoaded = true;
      const codes = Object.keys(state.myCrews);
      if(!state.crewEntered && codes.length === 1){
        // only one crew on this account - no real choice to make, so skip the switcher
        switchToCrew(codes[0]);
      } else {
        render();
      }
    };
    if(Object.keys(state.myCrews).length === 0){
      // index empty - could be a genuinely new account, or a crew joined before this
      // index existed. Do a one-off scan of actual crew memberships to self-heal the
      // index for anyone in the latter case; harmless (and cheap) if there's nothing to find.
      recoverUnindexedCrews().then(finish);
    } else {
      finish();
    }
  }).catch(err => {
    console.error('Failed to load your crews:', err);
    state.myCrewsLoaded = true;
    render();
  });
}
function recoverUnindexedCrews(){
  return db.ref('crews').once('value').then(snap => {
    const all = snap.val() || {};
    const found = {};
    Object.keys(all).forEach(code => {
      const crew = all[code];
      if(crew && crew.users && crew.users[state.userId]){
        found[code] = {joinedAt: crew.users[state.userId].updated || Date.now()};
      }
    });
    if(Object.keys(found).length){
      state.myCrews = found;
      const updates = {};
      Object.keys(found).forEach(code => { updates[code] = {joinedAt: firebase.database.ServerValue.TIMESTAMP}; });
      db.ref(`profiles/${state.userId}/crews`).update(updates)
        .catch(err => console.error('Failed to backfill recovered crews:', err));
    }
  }).catch(err => console.error('Failed to recover unindexed crews:', err));
}
function switchToCrew(code){
  if(!code) return;
  if(state.crewEntered && code === state.code) return;
  state.code = code;
  state.crewUsers = {};
  state.groupOwner = null;
  state.chatMessages = {};
  state.crewEntered = true;
  state.onboardStep = null;
  state.renamingCrewCode = null;

  db.ref(`crews/${code}/users/${state.userId}`).update({name: state.name, updated: firebase.database.ServerValue.TIMESTAMP})

let chatRef = null;
function attachChatListener(){
  if(!FB_READY || !state.code) return;
  if(chatRef) chatRef.off();
  chatRef = db.ref(`crews/${state.code}/chat`);
  let initialized = false;
  const seenKeys = new Set();
  chatRef.on('value', snap => {
    const val = snap.val() || {};
    state.chatMessages = val;
    if(!initialized){
      Object.keys(val).forEach(k => seenKeys.add(k));
      initialized = true;
    } else {
      Object.keys(val).forEach(k => {
        if(seenKeys.has(k)) return;
        seenKeys.add(k);
        const msg = val[k];
        if(msg && msg.uid !== state.userId && Array.isArray(msg.mentions) && msg.mentions.includes(state.userId)){
          notifyMention(msg);
        }
      });
    }
    render();
  });

function notifyMention(msg){
  if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;

function escapeRegex(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function parseMentions(text){
  const mentions = [];
  Object.keys(state.crewUsers).forEach(uid => {
    const name = (state.crewUsers[uid].name || '').trim();
    if(name && new RegExp('@' + escapeRegex(name) + '\\b', 'i').test(text)) mentions.push(uid);
  });
  return mentions;
}
function sortedChatMessages(){
  return Object.keys(state.chatMessages || {})
    .map(k => Object.assign({key: k}, state.chatMessages[k]))

function sendChatMessage(text, opts){
  if(!FB_READY || !state.code) return;
  opts = opts || {};
  const trimmed = (text||'').trim();
  if(!trimmed) return;
  const key = 'm' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
  const msg = {
    uid: state.userId,
    name: state.name,
    text: trimmed,
    mentions: opts.mentions || parseMentions(trimmed),
    system: !!opts.system,
    at: Date.now()
  };
  if(opts.photo) msg.photo = opts.photo;
  state.chatMessages = Object.assign({}, state.chatMessages, {[key]: msg});
  db.ref(`crews/${state.code}/chat/${key}`).set(Object.assign({}, msg, {at: firebase.database.ServerValue.TIMESTAMP}))
    .catch(err => console.error('Failed to send chat message:', err));

/* ---------------------------------------------------------------------
   Aggregation across crew
   --------------------------------------------------------------------- */
function actTaggers(actIdx){
  const must = [], maybe = [];
  for(const uid in state.crewUsers){
    const u = state.crewUsers[uid];
    const tag = u.picks && u.picks['a'+actIdx];
    if(tag === 'must') must.push(uid);
    else if(tag === 'maybe') maybe.push(uid);
  }
  return {must, maybe};
}
function actScore(actIdx){
  const {must,maybe} = actTaggers(actIdx);
  return must.length*2 + maybe.length;
}
function overlapsAct(a, b){
  if(a[1] !== b[1]) return false;
  const s1=normMin(a[2]), e1=normMin(a[3]);
  const s2=normMin(b[2]), e2=normMin(b[3]);
  return s1 < e2 && s2 < e1;
}
function myOverlappingPicks(actIdx, excludeSelf){
  const act = ACTS[actIdx];
  return myPicksList()
    .filter(p => p.actIdx !== actIdx)
    .filter(p => overlapsAct(ACTS[p.actIdx], act));
}
function allMyClashGroups(){
  const picks = myPicksList();
  const groups = [];
  for(const p of picks){
    let placed = false;
    for(const g of groups){
      if(g.some(idx => overlapsAct(ACTS[idx], ACTS[p.actIdx]))){
        g.push(p.actIdx); placed = true; break;
      }
    }
    if(!placed) groups.push([p.actIdx]);
  }
  return groups.filter(g => g.length > 1);
}
function clashActIdxSet(){
  const s = new Set();
  allMyClashGroups().forEach(g => g.forEach(i => s.add(i)));
  return s;
}

function render(){
  const root = document.getElementById('app');
  if(!FB_READY){ root.innerHTML = renderSetupNotice(); return; }
  if(!state.authReady){ root.innerHTML = renderLoadingScreen(); return; }
  if(!state.userId){ root.innerHTML = renderSignIn(); return; }
  if(!state.crewEntered){
    if(!state.myCrewsLoaded){ root.innerHTML = renderLoadingScreen(); return; }
    root.innerHTML = renderOnboarding();
    return;
  }
  if(state.onboardStep === 'genres'){
    root.innerHTML = renderGenreQuiz();
    return;

  root.innerHTML = renderShell();
  if(state.tab === 'chat'){
    const thread = document.getElementById('chatThread');
    if(thread) thread.scrollTop = thread.scrollHeight;
  }
}

function daysUntilFestival(){
  const first = new Date(FEST_DATES[0] + 'T00:00:00');
  const now = new Date();
  const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((first - startOfToday) / 86400000);
}
function renderCountdownBanner(){
  const last = new Date(FEST_DATES[FEST_DATES.length-1] + 'T23:59:59');
  if(new Date() > last){
    return `<div class="countdown-banner"><div class="countdown-label">See you next year!</div></div>`;
  }
  const days = daysUntilFestival();
  if(days <= 0){
    return `<div class="countdown-banner"><div class="countdown-num">IT'S ON</div><div class="countdown-label">Boomtown is happening right now</div></div>`;
  }
  return `
  <div class="countdown-banner">

    <div class="countdown-label">day${days===1?'':'s'} to Boomtown</div>
  </div>`;
}

function doStartCrew(){
  const code = genCode();
  state.code = code;
  state.crewEntered = true;
  db.ref(`crews/${code}/group`).set({created: firebase.database.ServerValue.TIMESTAMP, by: state.userId})
    .catch(err => console.error('Failed to create crew:', err));
  db.ref(`crews/${code}/users/${state.userId}`).set({name: state.name, picks:{}, updated: firebase.database.ServerValue.TIMESTAMP})
    .catch(err => console.error('Failed to create user:', err));
  db.ref(`profiles/${state.userId}/crews/${code}`).update({joinedAt: firebase.database.ServerValue.TIMESTAMP})
    .catch(err => console.error('Failed to index crew:', err));
  state.myCrews = state.myCrews || {};
  state.myCrews[code] = Object.assign({}, state.myCrews[code], {joinedAt: Date.now()});
  saveIdentity();
  attachListener();
  state.onboardStep = 'genres';
  render();
}
function doJoinCrew(){
  const code = state.joinCode.toUpperCase();
  db.ref(`crews/${code}/group`).once('value').then(snap => {
    if(!snap.exists()){
      state.joinError = 'Crew not found — check the code.';
      render();
      return;
    }
    state.code = code;
    state.crewEntered = true;
    state.joinError = '';
    saveIdentity();
    const userRef = db.ref(`crews/${code}/users/${state.userId}`);
    userRef.once('value').then(userSnap => {
      db.ref(`profiles/${state.userId}/crews/${code}`).update({joinedAt: firebase.database.ServerValue.TIMESTAMP})
        .catch(err => console.error('Failed to index crew:', err));
      state.myCrews = state.myCrews || {};
      state.myCrews[code] = Object.assign({}, state.myCrews[code], {joinedAt: Date.now()});
      if(userSnap.exists()){
        // returning member (e.g. signed in on a new device) - don't clobber existing picks
        userRef.update({name: state.name, updated: firebase.database.ServerValue.TIMESTAMP})
          .catch(err => console.error('Failed to update returning member:', err));
        state.onboardStep = null;
      } else {
        userRef.set({name: state.name, picks:{}, updated: firebase.database.ServerValue.TIMESTAMP})
          .catch(err => console.error('Failed to join crew:', err));
        state.onboardStep = 'genres';
      }
      attachListener();
      render();
    }).catch(err => console.error('Failed to check membership:', err));
  }).catch((err)=>{
    console.error('Failed to join crew:', err);
    state.joinError = 'Something went wrong — try again.';
    render();
  });
}

function applyGenreQuiz(){
  const selected = state.genreSelections;
  if(!selected.size) return;
  const MAX_PER_GENRE = 15;
  selected.forEach(genre=>{
    const keywords = GENRE_KEYWORDS[genre] || [];
    let count = 0;
    for(let i=0; i<ACTS.length && count<MAX_PER_GENRE; i++){
      if(myTagFor(i)) continue;
      const hay = (ACTS[i][4]+' '+STAGES[ACTS[i][0]]).toLowerCase();
      if(keywords.some(k=>hay.includes(k))){
        setMyPick(i, 'maybe');
        count++;
      }
    }
  });
}

/* ---------------------------------------------------------------------
   Schedule grid
   --------------------------------------------------------------------- */
const PX_PER_MIN = 1.9;
const LANE_HEIGHT = 58;
function assignLanes(dayItems){
  const sorted = dayItems.slice().sort((a,b)=>normMin(a.a[2])-normMin(b.a[2]));
  const laneEnds = []; // normalized end minute currently occupying each lane
  const withLane = [];
  sorted.forEach(x=>{
    const s = normMin(x.a[2]), e = normMin(x.a[3]);
    let lane = laneEnds.findIndex(end => end <= s);
    if(lane === -1){ lane = laneEnds.length; laneEnds.push(e); }
    else { laneEnds[lane] = e; }
    withLane.push({...x, lane});
  });
  // cap each item's usable width to the gap before the next item in its own lane,
  // so the minimum-width floor on very short sets can't visually bleed into a neighbour
  const byLane = {};
  withLane.forEach(x => (byLane[x.lane] = byLane[x.lane] || []).push(x));
  Object.values(byLane).forEach(laneItems => {
    laneItems.forEach((x, i) => {
      const next = laneItems[i+1];
      x.maxEnd = next ? normMin(next.a[2]) : Infinity;
    });
  });
  return {items: withLane, laneCount: laneEnds.length};
}
function renderScheduleGrid(){
  const items = actsForDay(state.day);
  if(!items.length) return `<div class="empty-state">No sets on this day.</div>`;
  let minStart = Infinity, maxEnd = -Infinity;
  items.forEach(x=>{
    const s = normMin(x.a[2]), e = normMin(x.a[3]);
    if(s<minStart) minStart=s;
    if(e>maxEnd) maxEnd=e;
  });
  const gridStart = Math.floor(minStart/60)*60;
  const gridEnd = Math.ceil(maxEnd/60)*60;
  const timelineWidth = (gridEnd-gridStart)*PX_PER_MIN;

  // hour marks
  let hours = '';
  for(let t=gridStart; t<=gridEnd; t+=60){
    const left = (t-gridStart)*PX_PER_MIN;
    const label = String(Math.floor((t%1440)/60)).padStart(2,'0');
    hours += `<div class="sched-hour-mark" style="left:${left}px">${label}:00</div>`;
  }

  // stages present, ordered by stage index
  const byStage = {};
  items.forEach(x=>{ (byStage[x.a[0]]=byStage[x.a[0]]||[]).push(x); });
  const stageIdxs = Object.keys(byStage).map(Number).sort((a,b)=>a-b);

  let rows = '';
  stageIdxs.forEach(si=>{
    const {items: laned, laneCount} = assignLanes(byStage[si]);
    const rowHeight = laneCount * LANE_HEIGHT;
    const blocks = laned.map(x=>{
      const s = normMin(x.a[2]), e = normMin(x.a[3]);
      const left = (s-gridStart)*PX_PER_MIN;
      const width = Math.min(Math.max((e-s)*PX_PER_MIN, 34), Math.max((x.maxEnd-s)*PX_PER_MIN, 6));
      const top = x.lane*LANE_HEIGHT + 4;
      const height = LANE_HEIGHT - 8;
      const tag = myTagFor(x.i);
      const ring = tag==='must' ? 'box-shadow:0 1px 3px rgba(0,0,0,.35),0 0 0 2px var(--gold) inset;' : (tag==='maybe' ? 'box-shadow:0 1px 3px rgba(0,0,0,.35),0 0 0 2px var(--blue) inset;' : '');
      const avatars = renderTaggerAvatars(x.i);
      return `<div class="sched-block" data-action="open-detail" data-act="${x.i}" style="left:${left}px;width:${width}px;top:${top}px;height:${height}px;background:${stageColorFill(si)};border-left-color:${stageColor(si)};${ring}">
        ${escapeHtml(x.a[4])}
        <div class="avset">${avatars}</div>
      </div>`;
    }).join('');
    rows += `<div class="sched-row" style="height:${rowHeight}px">
      <div class="sched-label"><span class="dot" style="background:${stageColor(si)};width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block;"></span><span>${escapeHtml(STAGES[si])}</span></div>
      <div class="sched-track" style="width:${timelineWidth}px">${blocks}</div>
    </div>`;
  });

  return `
  <div class="sched-scroll">
    <div>
      <div class="sched-hourrow">
        <div class="sched-corner"></div>

/* ---------------------------------------------------------------------
   Clash resolver sheet
   --------------------------------------------------------------------- */
function renderClashSheet(actIdxs){
  const scored = actIdxs.map(idx => ({idx, score: actScore(idx)}));
  const maxScore = Math.max(1, ...scored.map(s=>s.score));
  const bestIdx = scored.slice().sort((a,b)=>b.score-a.score)[0].idx;
  const rows = actIdxs.map(idx=>{
    const act = ACTS[idx];
    const score = actScore(idx);
    const pct = Math.max(6, Math.round(score/maxScore*100));
    const isBest = idx===bestIdx;
    return `
    <div class="clash-row ${isBest?'best':''}">
      <div class="clash-toprow">
        <div>
          <div class="set-time" style="display:inline;">${act[2]}&ndash;${act[3]}</div>
          <div class="set-title">${escapeHtml(act[4])}</div>
          <div class="set-stage-label">${escapeHtml(STAGES[act[0]])}</div>
        </div>
        ${isBest ? '<span class="clash-badge">CREW PICK</span>' : ''}
      </div>
      <div class="backing-bar-track"><div class="backing-bar-fill" style="width:${pct}%"></div></div>
      <button class="btn primary block" data-action="clash-keep" data-act="${idx}" data-group="${actIdxs.join(',')}">Keep this, drop the rest</button>
    </div>`;
  }).join('');
  return `
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" style="color:var(--red)">Clash!</div>
    <div class="sheet-sub">These overlap on ${DAY_LABELS[ACTS[actIdxs[0]][1]]}. Pick one or keep both.</div>
    ${rows}
    <button class="btn block ghost" data-action="clash-keep-both">Keep both</button>
  </div>`;
}

function buildShareText(actIdxs){
  if(!actIdxs.length) return '';
  const label = state.planDay==='all' ? 'My Boomtown plan' : `My Boomtown ${DAY_FULL[state.planDay]}`;
  const lines = [label+':'];
  let lastDay = null;
  actIdxs.forEach(idx=>{
    const act = ACTS[idx];
    if(state.planDay==='all' && act[1]!==lastDay){
      lines.push('', DAY_FULL[act[1]]+':');
      lastDay = act[1];
    }
    lines.push(`${act[2]} ${act[4]} @ ${STAGES[act[0]]}`);
  });
  lines.push('', `Join my crew on Boomtown Crew: code ${state.code}`);
  return lines.join('\n');
}
function icsEscape(s){
  return String(s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}
function icsDate(d){
  return d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
}
function buildICS(actIdxs){
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Boomtown Crew//EN'];
  actIdxs.forEach(idx=>{
    const act = ACTS[idx];
    lines.push(
      'BEGIN:VEVENT',
      `UID:boomtown-${idx}-${state.userId}@boomtownapp`,
      `DTSTART:${icsDate(actStart(act))}`,
      `DTEND:${icsDate(actEnd(act))}`,
      `SUMMARY:${icsEscape(act[4])}`,
      `LOCATION:${icsEscape(STAGES[act[0]])}`,
      'END:VEVENT'
    );
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}
function allCrewPickedActIdxs(){
  const set = new Set();
  for(const uid in state.crewUsers){
    const picks = state.crewUsers[uid].picks || {};
    Object.keys(picks).forEach(k => { if(picks[k]) set.add(parseInt(k.slice(1),10)); });
  }
  return [...set];
}
function renderNextUpCard(){

   --------------------------------------------------------------------- */
function renderHeatTab(){
  let idxRange;
  if(state.heatDay === 'all'){
    idxRange = ACTS.map((a,i)=>i);
  } else {
    idxRange = actsForDay(state.heatDay).map(x=>x.i);
  }
  const scored = idxRange.map(i => ({i, score: actScore(i)})).filter(s=>s.score>0);
  scored.sort((a,b)=>b.score-a.score);
  const top = scored.slice(0,50);
  const maxScore = Math.max(1, ...top.map(s=>s.score));
  if(!top.length){
    return `${renderDayPills('heat', true)}<div class="empty-state">No crew picks yet. Once your crew starts tagging MUST/MAYBE acts, the leaderboard shows up here.</div>`;
  }
  const rows = top.map((s,rank)=>{
    const act = ACTS[s.i];
    const {must,maybe} = actTaggers(s.i);
    const pct = Math.round(s.score/maxScore*100);
    const avatars = renderTaggerAvatars(s.i);
    return `
    <div class="heat-row">
      <div class="heat-rank">#${rank+1}</div>
      <div class="heat-main">
        <div class="heat-title">${escapeHtml(act[4])}</div>
        <div class="heat-meta">${escapeHtml(STAGES[act[0]])} &middot; ${DAY_LABELS[act[1]]} &middot; ${act[2]}</div>

  return `${renderDayPills('heat', true)}${rows}`;
}

function renderChatMessage(msg){

function updateChatMentionSuggestions(){
  const box = document.getElementById('chatMentionSuggestions');
  if(!box) return;
  const q = state.chatMentionQuery;
  if(q == null){ box.innerHTML = ''; return; }
  const matches = Object.keys(state.crewUsers)
    .filter(uid => uid !== state.userId)
    .map(uid => (state.crewUsers[uid].name || '').trim())
    .filter(name => name && name.toLowerCase().startsWith(q.toLowerCase()));
  if(!matches.length){ box.innerHTML = ''; return; }
  box.innerHTML = matches.map(name => `<button class="chat-mention-suggestion" data-action="pick-mention" data-name="${escapeHtml(name)}">@${escapeHtml(name)}</button>`).join('');

function formatClockTime(ts){
  if(!ts) return '';
  const d = new Date(ts);
  let h = d.getHours();
  const m = d.getMinutes().toString().padStart(2,'0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if(h===0) h = 12;
  return `${h}:${m} ${ampm}`;
}
function renderChatText(text){
  let html = escapeHtml(text);
  const names = Object.values(state.crewUsers).map(u => (u.name||'').trim()).filter(Boolean).sort((a,b)=>b.length-a.length);
  names.forEach(name => {
    const re = new RegExp('@' + escapeRegex(escapeHtml(name)) + '\\b', 'gi');
    html = html.replace(re, m => `<span class="chat-mention">${m}</span>`);
  });
  return html;
}

      </div>
      ${isLive?'<span class="live-dot" style="margin-left:0;"></span>':''}
      ${canEdit ? `<button class="link-btn" style="padding:4px 2px;" data-action="open-edit-name" data-uid="${uid}">Edit</button>` : ''}
      ${canRemove ? `<button class="link-btn" style="padding:4px 2px;color:var(--red);" data-action="remove-member" data-uid="${uid}">Remove</button>` : ''}
    </div>`;
  }).join('');
  return `
  <div class="sheet sheet-rel">
    <button class="close-x" data-action="close-sheet">&times;</button>
    <div class="sheet-handle"></div>
    <div class="sheet-title">Your crew</div>
    <div class="crew-code-big">${escapeHtml(state.code)}</div>
    <button class="btn block" data-action="copy-code" style="margin-bottom:16px;">Copy code to share</button>
    ${rows}
    <div style="height:16px"></div>
    <button class="btn block" data-action="open-photo">Edit my profile photo</button>
    <div style="height:8px"></div>
    <button class="btn block" data-action="open-bingo">Festival Bingo</button>
    <div style="height:8px"></div>
    <button class="btn block" data-action="switch-group">Switch group</button>
    <div style="height:8px"></div>
    <button class="btn block danger" data-action="leave-crew">Leave crew</button>
    <div style="height:8px"></div>
    <button class="btn block ghost" data-action="sign-out">Sign out</button>
  </div>`;
}
function renderPhotoSheet(){
  const me = myUser();
  const preview = me.photo ? `<div class="avatar lg" style="background-image:url('${me.photo.replace(/'/g,"%27")}')"></div>` : `<div class="avatar lg" style="background:hsl(${hashHue(state.userId)},55%,42%)">${escapeHtml(initials(state.name))}</div>`;
  return `
  <div class="sheet sheet-rel">
    <button class="close-x" data-action="close-sheet">&times;</button>
    <div class="sheet-handle"></div>
    <div class="sheet-title">Profile photo</div>
    <div class="photo-preview-wrap" id="photoPreviewWrap">${preview}</div>
    <label class="upload-label">Upload from phone<input type="file" id="photoFileInput" accept="image/*"></label>
    <div class="field-label">or paste an image URL</div>
    <input id="photoUrlInput" placeholder="https://&hellip;" value="">
    <div style="height:12px"></div>
    <button class="btn primary block" id="photoSaveBtn">Save photo</button>
  </div>`;
}

/* ---------------------------------------------------------------------
   Photo processing (canvas centre-crop)
   --------------------------------------------------------------------- */
function cropToSquareJpeg(imgSrc, size, cb){
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const side = Math.min(img.width, img.height);
    const sx = (img.width-side)/2, sy=(img.height-side)/2;
    ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
    try{
      cb(canvas.toDataURL('image/jpeg', 0.85));
    }catch(e){
      console.error('Failed to crop photo:', e);
      cb(null);
    }
  };
  img.onerror = (e) => { console.error('Failed to load photo for cropping:', e); cb(null); };
  img.src = imgSrc;
}

/* ---------------------------------------------------------------------
   Event delegation
   --------------------------------------------------------------------- */
document.addEventListener('click', function(e){
  const overlay = e.target.closest('[data-action="overlay-close"]');
  const stopEl = e.target.closest('[data-action="stop"]');
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;

  if(action === 'overlay-close'){
    state.sheet = null; render(); return;
  }
  if(action === 'stop'){ return; }

  switch(action){
    case 'start-crew':
      doStartCrew();
      return;
    case 'show-join':
      state.onboardStep = 'join'; render(); return;
    case 'back-to-choice':
      state.onboardStep = 'choice'; render(); return;
    case 'show-choice':
      state.onboardStep = 'choice'; render(); return;
    case 'back-to-switch':
      state.onboardStep = null; state.renamingCrewCode = null; render(); return;
    case 'dismiss-removed-notice':
      state.removedNotice = null; render(); return;
    case 'switch-to-crew':
      switchToCrew(btn.dataset.code); return;
    case 'rename-crew-label':
      state.renamingCrewCode = btn.dataset.code; render(); return;
    case 'cancel-rename-crew':
      state.renamingCrewCode = null; render(); return;
    case 'save-crew-label': {
      const code = btn.dataset.code;
      const input = document.getElementById('renameCrewInput');
      const label = (input ? input.value.trim() : '') || code;
      state.myCrews = state.myCrews || {};
      state.myCrews[code] = Object.assign({}, state.myCrews[code], {label});
      state.renamingCrewCode = null;
      render();
      db.ref(`profiles/${state.userId}/crews/${code}/label`).set(label)
        .catch(err => console.error('Failed to save crew label:', err));
      return;
    }
    case 'switch-group':
      detachListeners();
      state.code = null;
      state.crewUsers = {};
      state.groupOwner = null;
      state.crewEntered = false;
      state.onboardStep = null;
      state.sheet = null;
      saveIdentity();
      render();
      return;
    case 'toggle-genre': {
      const g = btn.dataset.genre;
      if(state.genreSelections.has(g)) state.genreSelections.delete(g); else state.genreSelections.add(g);
      render(); return;
    }
    case 'apply-genre-quiz':
      applyGenreQuiz();
      state.onboardStep = null;
      render(); return;
    case 'skip-genre-quiz':
      state.onboardStep = null;
      render(); return;
    case 'set-tab':
      state.tab = btn.dataset.tab; state.sheet=null; render(); return;
    case 'set-day':
      state.day = parseInt(btn.dataset.day,10); render(); return;
    case 'set-plan-day':
      state.planDay = btn.dataset.day==='all' ? 'all' : parseInt(btn.dataset.day,10); render(); return;
    case 'set-plan-mode':
      state.planMode = btn.dataset.mode; render(); return;
    case 'remove-pick':
      setMyPick(parseInt(btn.dataset.act,10), null); render(); return;
    case 'enable-notifications':
      if(typeof Notification !== 'undefined') Notification.requestPermission().then(()=>render());
      return;
    case 'open-note':
      state.sheet = {type:'note', actIdx: parseInt(btn.dataset.act,10)}; render(); return;
    case 'save-note': {
      const actIdx = parseInt(btn.dataset.act,10);
      const input = document.getElementById('noteInput');
      setMyNote(actIdx, input ? input.value.trim() : '');
      state.sheet = null; render(); return;
    }
    case 'toggle-bingo':
      toggleBingoItem(parseInt(btn.dataset.idx,10)); render(); return;
    case 'open-bingo':
      state.sheet = {type:'bingo'}; render(); return;
    case 'share-plan': {
      const text = buildShareText(getFilteredPickIdxs('mine'));
      if(!text) return;
      if(navigator.share){
        navigator.share({title:'My Boomtown plan', text}).catch(()=>{});
      } else if(navigator.clipboard){
        navigator.clipboard.writeText(text).then(()=>{
          const label = btn.textContent;
          btn.textContent = 'Copied!';
          setTimeout(()=>{ btn.textContent = label; }, 1200);
        }).catch(()=>{});
      }
      return;
    }
    case 'export-calendar': {
      const ics = buildICS(getFilteredPickIdxs('mine'));
      if(!ics) return;
      const blob = new Blob([ics], {type:'text/calendar'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'boomtown-plan.ics';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 1000);
      return;
    }
    case 'set-heat-day':
      state.heatDay = btn.dataset.day==='all' ? 'all' : parseInt(btn.dataset.day,10); render(); return;
    case 'set-lineup-view':
      state.lineupView = btn.dataset.view; render(); return;
    case 'toggle-stage': {
      const si = parseInt(btn.dataset.stage,10);
      if(state.openStages.has(si)) state.openStages.delete(si); else state.openStages.add(si);
      render(); return;
    }
    case 'tag-act': {
      const actIdx = parseInt(btn.dataset.act,10);
      const tag = btn.dataset.tag;
      const current = myTagFor(actIdx);
      const newTag = current === tag ? null : tag;
      setMyPick(actIdx, newTag);
      if(newTag){
        const overlapping = myOverlappingPicks(actIdx);
        if(overlapping.length){
          state.sheet = {type:'clash', actIdxs:[actIdx, ...overlapping.map(o=>o.actIdx)]};
        } else {
          state.sheet = null;
        }
      } else {
        state.sheet = null;
      }
      render();
      return;
    }
    case 'open-detail':
      state.sheet = {type:'detail', actIdx: parseInt(btn.dataset.act,10)}; render(); return;
    case 'close-sheet':
      state.sheet = null; render(); return;
    case 'clash-keep': {
      const keepIdx = parseInt(btn.dataset.act,10);
      const group = btn.dataset.group.split(',').map(Number);
      group.forEach(idx=>{ if(idx!==keepIdx) setMyPick(idx, null); });
      state.sheet = null; render(); return;
    }
    case 'clash-keep-both':
      state.sheet = null; render(); return;
    case 'open-crew':
      state.sheet = {type:'crew'}; render(); return;
    case 'open-photo':
      state.sheet = {type:'photo'}; render(); return;
    case 'sign-in-google':
      signInWithGoogle(); return;
    case 'toggle-install-help':
      state.showInstallHelp = !state.showInstallHelp; render(); return;
    case 'install-now':
      if(deferredInstallPrompt){
        deferredInstallPrompt.prompt();
        deferredInstallPrompt.userChoice.finally(() => { deferredInstallPrompt = null; render(); });
      }
      return;
    case 'sign-out':
      if(confirm('Sign out?')){
        state.sheet = null;
        signOutUser();
      }
      return;
    case 'copy-code': {
      if(navigator.clipboard) navigator.clipboard.writeText(state.code).catch(()=>{});
      btn.textContent = 'Copied!';
      setTimeout(()=>{ if(state.sheet && state.sheet.type==='crew') render(); }, 900);
      return;
    }
    case 'leave-crew': {
      if(confirm('Leave this crew? Your picks will be removed from the crew.')){
        leaveCrewRemote();
        clearIdentity();
        render();
      }
      return;
    }
    case 'open-edit-name':
      state.sheet = {type:'editname', uid: btn.dataset.uid}; render(); return;
    case 'save-edit-name': {
      const uid = btn.dataset.uid;
      const input = document.getElementById('editNameInput');
      const val = input ? input.value.trim() : '';
      if(val) setMemberName(uid, val);
      state.sheet = null; render(); return;
    }
    case 'remove-member': {
      const uid = btn.dataset.uid;
      const name = (state.crewUsers[uid] && state.crewUsers[uid].name) || 'this person';
      if(confirm(`Remove ${name} from the crew?`)){
        removeMember(uid);
        render();
      }
      return;
    }
    case 'leave-live': {
      const me = myUser();
      const wasAt = me.live && me.live.stage != null ? me.live.stage : null;
      state.liveTempPhoto = null;
      setLive(null);
      if(wasAt != null){
        sendChatMessage(`${state.name} left ${STAGES[wasAt]}`, {system: true, mentions: []});
      }
      render();
      return;
    }
    case 'do-checkin': {
      const sel = document.getElementById('liveStageSelect');
      const actSel = document.getElementById('liveActSelect');
      const stage = sel ? parseInt(sel.value,10) : null;
      if(stage==null || isNaN(stage)) return;
      const act = actSel && actSel.value !== '' ? parseInt(actSel.value,10) : null;
      const photo = state.liveTempPhoto || null;
      setLive({stage, act, photo, since: firebase.database.ServerValue.TIMESTAMP});
      const watching = act != null && ACTS[act] ? ` — watching ${ACTS[act][4]}` : '';
      sendChatMessage(`${state.name} checked in at ${STAGES[stage]}${watching}`, {system: true, mentions: [], photo});
      state.liveStagePick = null; state.liveActPick=''; state.liveTempPhoto = null;
      render();
      return;
    }
    case 'tag-in-chat': {
      const nameToTag = btn.dataset.name;
      const input = document.getElementById('chatInput');
      const current = input ? input.value : (state.chatDraft || '');
      const needsSpace = current.length > 0 && !current.endsWith(' ');
      const updated = current + (needsSpace ? ' ' : '') + '@' + nameToTag + ' ';
      state.chatDraft = updated;
      state.chatMentionQuery = null;
      if(input){ input.value = updated; input.focus(); }
      updateChatMentionSuggestions();
      const sendBtn = document.querySelector('[data-action="send-chat"]');
      if(sendBtn) sendBtn.disabled = !updated.trim();
      return;
    }
    case 'pick-mention': {
      const input = document.getElementById('chatInput');
      if(!input){ return; }
      const name = btn.dataset.name;
      const caret = input.selectionStart;
      const val = input.value;
      const atIdx = val.slice(0, caret).lastIndexOf('@');
      if(atIdx !== -1){
        const before = val.slice(0, atIdx);
        const after = val.slice(caret);
        const newVal = before + '@' + name + ' ' + after;
        input.value = newVal;
        state.chatDraft = newVal;
        const newCaret = (before + '@' + name + ' ').length;
        input.setSelectionRange(newCaret, newCaret);
      }
      state.chatMentionQuery = null;
      updateChatMentionSuggestions();
      input.focus();
      const sendBtn = document.querySelector('[data-action="send-chat"]');
      if(sendBtn) sendBtn.disabled = !input.value.trim();
      return;
    }
    case 'send-chat': {
      const input = document.getElementById('chatInput');
      const text = input ? input.value : state.chatDraft;
      sendChatMessage(text);
      state.chatDraft = '';
      state.chatMentionQuery = null;
      render();
      return;
    }
  }
});

document.addEventListener('input', function(e){
  if(e.target.id === 'joinCodeInput'){
    state.joinCode = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4);
    e.target.value = state.joinCode;
    const btn = document.getElementById('joinBtn');
    if(btn) btn.disabled = state.joinCode.length !== 4;
    return;
  }
  if(e.target.id === 'chatInput'){
    state.chatDraft = e.target.value;
    const btn = document.querySelector('[data-action="send-chat"]');
    if(btn) btn.disabled = !state.chatDraft.trim();
    const uptoCaret = e.target.value.slice(0, e.target.selectionStart);
    const m = uptoCaret.match(/(?:^|\s)@([a-zA-Z0-9]*)$/);
    state.chatMentionQuery = m ? m[1] : null;
    updateChatMentionSuggestions();
    return;
  }
  if(e.target.id === 'searchInput'){
    state.search = e.target.value;
    render();
    // restore focus + caret after re-render
    const el = document.getElementById('searchInput');
    if(el){ el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
    return;
  }
  if(e.target.id === 'photoUrlInput'){
    const url = e.target.value.trim();
    const wrap = document.getElementById('photoPreviewWrap');
    if(wrap && url){
      wrap.innerHTML = `<div class="avatar lg" style="background-image:url('${url.replace(/'/g,"%27")}')"></div>`;
    }
    return;
  }
});

document.addEventListener('change', function(e){
  if(e.target.id === 'liveStageSelect'){
    const v = e.target.value;
    state.liveStagePick = v==='' ? null : parseInt(v,10);
    state.liveActPick = '';
    render();
    return;
  }
  if(e.target.id === 'liveActSelect'){
    state.liveActPick = e.target.value;
    return;
  }
  if(e.target.id === 'photoFileInput'){
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      cropToSquareJpeg(reader.result, 96, (dataUrl) => {
        if(!dataUrl) return;
        const wrap = document.getElementById('photoPreviewWrap');
        if(wrap) wrap.innerHTML = `<div class="avatar lg" style="background-image:url('${dataUrl}')"></div>`;
        pendingPhoto = dataUrl;
      });
    };
    reader.readAsDataURL(file);
    return;
  }
  if(e.target.id === 'liveFileInput'){
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      cropToSquareJpeg(reader.result, 96, (dataUrl) => {
        if(!dataUrl) return;
        state.liveTempPhoto = dataUrl;
        render();
      });
    };
    reader.readAsDataURL(file);
    return;
  }
});

let pendingPhoto = null;
document.addEventListener('click', function(e){
  if(e.target.id === 'photoSaveBtn'){
    const urlInput = document.getElementById('photoUrlInput');
    const url = urlInput ? urlInput.value.trim() : '';
    if(pendingPhoto){
      setPhoto(pendingPhoto);
      pendingPhoto = null;
    } else if(url){
      setPhoto(url);
    }
    state.sheet = null;
    render();
    return;
  }
  if(e.target.id === 'joinBtn'){
    doJoinCrew();
    return;
  }
});

document.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    if(e.target.id === 'joinCodeInput' && state.joinCode.length===4){
      doJoinCrew();
    }
    if(e.target.id === 'chatInput' && e.target.value.trim()){
      sendChatMessage(e.target.value);
      state.chatDraft = '';
      render();
    }
  }
});

/* ---------------------------------------------------------------------
   Boot
   --------------------------------------------------------------------- */
loadIdentity();
if(FB_READY){
  firebase.auth().onAuthStateChanged(user => {
    state.authReady = true;
    if(user){
      state.userId = user.uid;
      if(!state.name) state.name = user.displayName || 'Friend';
      ensureProfile();
      state.myCrewsLoaded = false;
      // if this device remembers a crew code from before this account's crew list was
      // indexed, backfill it into the index first so loadMyCrews() can see it below
      const backfill = state.code
        ? db.ref(`profiles/${user.uid}/crews/${state.code}`).update({joinedAt: firebase.database.ServerValue.TIMESTAMP}).catch(err => console.error('Failed to backfill crew index:', err))
        : Promise.resolve();
      backfill.then(() => loadMyCrews());
    } else {
      detachListeners();
      state.userId = null;
      state.code = null;
      state.crewUsers = {};
      state.crewEntered = false;
      state.myCrews = {};
      state.myCrewsLoaded = false;
      state.onboardStep = null;
      saveIdentity();
    }
    render();
  });
} else {
  state.authReady = true;
}
render();
setInterval(()=>{
  checkUpcomingNotifications();
  if((state.tab==='live' || state.tab==='plan') && !state.sheet) render();
}, 30000);
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
